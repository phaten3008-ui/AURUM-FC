<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFC | Comprehensive Admin Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold: #D4A757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: url('017714e7a5037887c750e844f41e7d60.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75); z-index: -1;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .side-nav {
            height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px);
            border-left: 1px solid var(--border); overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column;
        }

        .nav-item { display: flex; align-items: center; padding: 12px 25px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .nav-text { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); font-weight: bold; margin-right: 15px; }

        .admin-box { background: rgba(212, 167, 87, 0.05); border: 1px solid var(--gold); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box;
        }
        .admin-form label { color: var(--gold); font-size: 14px; display: block; margin-bottom: 5px; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }

        .btn-action { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; width: 100%; transition: 0.3s;}
        
        .nav-footer { padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border); text-align: center; }
        .socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .socials a { color: var(--gold); font-size: 22px; }

        /* ستايل مخصص لزر رفع الملف */
        input[type="file"] { padding: 10px; background: rgba(212, 167, 87, 0.1); border: 1px dashed var(--gold); cursor: pointer; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid var(--border); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="sideNav" class="side-nav">
        <div style="flex-grow:1; padding-top:80px;">
            <div class="nav-item" onclick="switchPage('news')"><span class="nav-text">آخر الأخبار</span></div>
            <div class="nav-item" onclick="switchPage('vote')"><span class="nav-text">صوت للاعب الشهر</span></div>
            <div class="nav-item" onclick="switchPage('clips')"><span class="nav-text">لقطات التدريبات</span></div>
            <div class="nav-item" onclick="switchPage('matches')"><span class="nav-text">أوقات المباريات</span></div>
            <div class="nav-item" onclick="switchPage('quotes')"><span class="nav-text">كلمات اللاعبين</span></div>
            <div id="playerSection" style="display:none;">
                <div class="nav-item" onclick="switchPage('training')"><span class="nav-text">أوقات التدريب</span></div>
            </div>
            <div id="adminSection" style="display:none;">
                <div class="nav-item" onclick="switchPage('adminHub')" style="background:rgba(212,167,87,0.1); border-top:1px solid var(--gold);"><span class="nav-text">مركز الإدارة الشامل</span></div>
            </div>
        </div>
        <div class="nav-footer">
            <div class="socials">
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
            </div>
            <button id="authBtn" class="btn-action" style="background:none; color:var(--gold); border:1px solid var(--gold);" onclick="handleAuth()">تسجيل الدخول</button>
        </div>
    </div>

    <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; justify-content:center; align-items:center; backdrop-filter:blur(20px);">
        <div class="glass-card" style="width:300px; text-align:center;">
            <h2 style="font-family:'Cinzel'; color:var(--gold);">Secure Access</h2>
            <input type="text" id="userInput" placeholder="اسم المستخدم" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border); background:none; color:white; text-align:center; box-sizing: border-box;">
            <input type="password" id="passInput" placeholder="كلمة السر" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid var(--border); background:none; color:white; text-align:center; box-sizing: border-box;">
            <button class="btn-action" onclick="login()">دخول</button>
            <p onclick="hideLogin()" style="cursor:pointer; margin-top:15px; font-size:12px; color:var(--gold);">إلغاء</p>
        </div>
    </div>

    <header>
        <div style="width:40px"></div>
        <div style="text-align:center;">
            <img src="PSX_20260412_121049_preview_rev_1-1_preview_rev_1.jpg" style="width:60px; border-radius:50%; border:2px solid var(--gold);">
            <h1 style="font-family:'Cinzel'; color:var(--gold); font-size:18px; margin:0;">AFC PORTAL</h1>
        </div>
        <button onclick="toggleNav()" style="background:none; border:1px solid var(--gold); padding:10px; border-radius:8px; cursor:pointer;">
            <span style="display:block; width:22px; height:2px; background:var(--gold); margin:4px 0;"></span>
            <span style="display:block; width:22px; height:2px; background:var(--gold); margin:4px 0;"></span>
        </button>
    </header>

    <div class="container">
        
        <section id="adminHub" class="page">
            <div class="admin-box admin-form">
                <h2 style="font-family:'Cinzel'; color:var(--gold); margin-top:0;">مركز التحكم الشامل</h2>
                
                <label>اختر القسم المراد تحديثه:</label>
                <select id="targetSection" onchange="updateAdminFields()">
                    <option value="news">آخر الأخبار</option>
                    <option value="vote">لاعب الشهر (إضافة مرشح)</option>
                    <option value="clips">لقطات التدريبات (رفع فيديو)</option>
                    <option value="matches">أوقات المباريات</option>
                    <option value="quotes">كلمات اللاعبين</option>
                    <option value="training">أوقات التدريب (للاعبين)</option>
                </select>

                <div id="dynamicFields">
                    <input type="text" id="titleInput" placeholder="العنوان">
                    <textarea id="descInput" placeholder="التفاصيل"></textarea>
                </div>

                <button class="btn-action" onclick="publishContent()">نشر التحديث الآن</button>
            </div>
        </section>

        <section id="news" class="page active"><div id="newsFeed" class="glass-card"><h2>الأخبار</h2></div></section>
        <section id="vote" class="page"><div id="voteFeed" class="glass-card"><h2>تصويت لاعب الشهر</h2></div></section>
        <section id="clips" class="page"><div id="clipsFeed" class="glass-card"><h2>فيديوهات التدريب</h2></div></section>
        <section id="matches" class="page"><div id="matchesFeed" class="glass-card"><h2>جدول المباريات</h2></div></section>
        <section id="quotes" class="page"><div id="quotesFeed" class="glass-card"><h2>كلمات اللاعبين</h2></div></section>
        <section id="training" class="page"><div id="trainingFeed" class="glass-card"><h2>جدول التمارين الخاص</h2></div></section>
    </div>

    <script>
        let currentUserRole = "guest"; // لحفظ حالة الدخول

        function toggleNav() {
            const n = document.getElementById("sideNav");
            n.style.width = n.style.width === "300px" ? "0" : "300px";
        }

        function switchPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleNav();
        }

        function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }

        // دالة التعامل مع زر الدخول / الخروج
        function handleAuth() {
            if (currentUserRole === "guest") {
                showLogin(); // إذا كان زائر، افتح شاشة الدخول
            } else {
                // إذا كان مسجل دخول (إداري أو لاعب)، قم بتسجيل الخروج
                currentUserRole = "guest";
                document.getElementById('adminSection').style.display = 'none';
                document.getElementById('playerSection').style.display = 'none';
                document.getElementById('authBtn').innerText = "تسجيل الدخول";
                switchPage('news'); // العودة للصفحة الرئيسية
                alert("تم تسجيل الخروج بنجاح.");
            }
        }

        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            
            if(u === "QEVC12" && p === "MGR12") {
                currentUserRole = "admin";
                document.getElementById('adminSection').style.display = 'block';
                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('authBtn').innerText = "تسجيل خروج (Admin)";
                hideLogin(); 
                document.getElementById('userInput').value = ""; document.getElementById('passInput').value = "";
                alert("مرحباً أيها المدير الشامل.");
            } else if(u === "PLAYER" && p === "123") {
                currentUserRole = "player";
                document.getElementById('playerSection').style.display = 'block';
                document.getElementById('authBtn').innerText = "تسجيل خروج (Player)";
                hideLogin();
                document.getElementById('userInput').value = ""; document.getElementById('passInput').value = "";
            } else { 
                alert("بيانات خاطئة!"); 
            }
        }

        function updateAdminFields() {
            const section = document.getElementById('targetSection').value;
            const fields = document.getElementById('dynamicFields');
            
            if(section === 'clips') {
                // إضافة حقل رفع ملف الفيديو (مباشرة من الجهاز)
                fields.innerHTML = `
                    <input type="text" id="titleInput" placeholder="عنوان الفيديو">
                    <label>اختر فيديو من جهازك:</label>
                    <input type="file" id="videoFileInput" accept="video/mp4,video/x-m4v,video/*">
                `;
            } else if(section === 'matches') {
                fields.innerHTML = '<input type="text" id="titleInput" placeholder="المباراة (مثلاً: AFC vs Rival)"><input type="text" id="descInput" placeholder="الموعد والمكان">';
            } else {
                fields.innerHTML = '<input type="text" id="titleInput" placeholder="العنوان / اسم اللاعب"><textarea id="descInput" placeholder="التفاصيل"></textarea>';
            }
        }

        function publishContent() {
            const section = document.getElementById('targetSection').value;
            const title = document.getElementById('titleInput').value;
            const feed = document.getElementById(section + 'Feed');

            if(!title) return alert("يرجى كتابة العنوان على الأقل");

            const newCard = document.createElement('div');
            newCard.className = "glass-card";
            newCard.style.marginTop = "10px";

            // التعامل الخاص مع قسم الفيديوهات
            if (section === 'clips') {
                const videoFile = document.getElementById('videoFileInput').files[0];
                if (!videoFile) return alert("يرجى اختيار ملف فيديو");
                
                // إنشاء رابط محلي للفيديو المرفوع לעرضه فوراً
                const videoURL = URL.createObjectURL(videoFile);
                newCard.innerHTML = `
                    <h3 style="color:var(--gold); margin:0;">${title}</h3>
                    <video controls>
                        <source src="${videoURL}" type="${videoFile.type}">
                        متصفحك لا يدعم تشغيل الفيديو.
                    </video>
                `;
            } else {
                const desc = document.getElementById('descInput').value;
                newCard.innerHTML = `<h3 style="color:var(--gold); margin:0;">${title}</h3><p>${desc}</p>`;
            }
            
            feed.prepend(newCard);
            alert("تم النشر بنجاح!");
            
            // تصفير الخانات
            document.getElementById('titleInput').value = "";
            if(document.getElementById('descInput')) document.getElementById('descInput').value = "";
            if(document.getElementById('videoFileInput')) document.getElementById('videoFileInput').value = "";

            switchPage(section);
        }

        // تهيئة الحقول عند فتح الصفحة
        updateAdminFields();
    </script>
</body>
</html>
