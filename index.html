<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFC | Elite Club Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #D4A757; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #050505 url('017714e7a5037887c750e844f41e7d60.jpg') no-repeat center center fixed; background-size: cover; color: white; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: -1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        
        .side-nav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); border-left: 1px solid var(--border); overflow-x: hidden; transition: 0.5s; display: flex; flex-direction: column; }
        .nav-item { padding: 20px 30px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; color: var(--gold); font-weight: bold; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px 120px 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; position: relative; }
        
        .info-btn { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: var(--gold); color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 4000; }
        
        #aboutModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(25px); padding: 30px; border-radius: 25px; border: 1px solid var(--gold); z-index: 5000; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 4999; }

        .vote-card { display: flex; align-items: center; justify-content: space-between; background: rgba(212, 167, 87, 0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .vote-btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .news-img, video { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .player-circle { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        
        .btn-action { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Cairo'; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="info-btn" onclick="openAbout()"><i class="fas fa-question"></i></div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeAbout()"></div>
    <div id="aboutModal">
        <h2 style="color:var(--gold); margin:0 0 15px 0;">حول نادي AFC</h2>
        <div id="aboutContent" style="margin-bottom: 20px; line-height: 1.6;">جاري التحميل...</div>
        <div id="adminAboutControls" style="display:none;">
            <textarea id="aboutEditField" rows="4"></textarea>
            <button class="btn-action" onclick="saveAbout()">حفظ التعديل</button>
        </div>
        <button onclick="closeAbout()" style="background:none; border:none; color:white; opacity:0.5; cursor:pointer; margin-top:10px;">إغلاق</button>
    </div>

    <div id="sideNav" class="side-nav">
        <div style="padding:25px;"><i class="fas fa-times" onclick="toggleNav()" style="font-size:25px; color:var(--gold); cursor:pointer;"></i></div>
        <div class="nav-item" onclick="switchPage('news')">الأخبار</div>
        <div class="nav-item" onclick="switchPage('training')">لقطات التدريب</div>
        <div class="nav-item" onclick="switchPage('matches')">المباريات</div>
        <div class="nav-item" onclick="switchPage('players')">كلمة اللاعبين</div>
        <div class="nav-item" onclick="switchPage('votePage')">لاعب الشهر ⭐</div>
        <div id="playerOnlyNav" style="display:none; border-top: 1px solid var(--border);"><div class="nav-item" onclick="switchPage('exerciseTimes')"><i class="fas fa-clock"></i> أوقات التمرين</div></div>
        <div id="adminMenu" style="display:none; border-top:1px solid var(--gold);"><div class="nav-item" onclick="switchPage('adminHub')">لوحة المدير</div></div>
        <div id="playerMenu" style="display:none; border-top:1px solid var(--gold);"><div class="nav-item" onclick="switchPage('playerWrite')">كتابة كلمة</div></div>
    </div>

    <header>
        <button onclick="toggleNav()" style="background:none; border:none; color:var(--gold); font-size:25px;"><i class="fas fa-bars"></i></button>
        <img src="PSX_20260412_121049_preview_rev_1-1_preview_rev_1.jpg" style="width:45px; border-radius:50%; border:1px solid var(--gold);">
        <button onclick="handleLogin()" style="background:none; border:none; color:var(--gold); font-size:25px;"><i class="fas fa-user-circle" id="userIcon"></i></button>
    </header>

    <div class="container">
        <section id="news" class="page active"><div id="newsFeed"></div></section>
        <section id="training" class="page"><div id="trainingFeed"></div></section>
        <section id="matches" class="page"><div id="matchesFeed"></div></section>
        <section id="players" class="page"><div id="playersFeed"></div></section>
        <section id="votePage" class="page"><h2 style="color:var(--gold); text-align:center;">🏆 تصويت لاعب الشهر</h2><div id="voteFeed"></div></section>
        <section id="exerciseTimes" class="page"><h2 style="color:var(--gold)">📅 جدول التمارين القادمة</h2><div id="exerciseFeed"></div></section>

        <section id="adminHub" class="page">
            <div class="glass-card">
                <h2 style="color:var(--gold)">نشر محتوى جديد</h2>
                <select id="targetTab" onchange="toggleInputs()">
                    <option value="news">خبر جديد</option>
                    <option value="training">لقطة تدريب</option>
                    <option value="matches">مباراة</option>
                    <option value="training_times">وقت تمرين</option>
                    <option value="player_of_month">مرشح لاعب الشهر</option>
                </select>
                <input type="text" id="mTitle" placeholder="العنوان أو اسم اللاعب">
                <input type="file" id="mFile">
                <div id="extraFields"></div>
                <textarea id="mContent" rows="4" placeholder="التفاصيل"></textarea>
                <button id="mainBtn" class="btn-action" onclick="publishWithFile('admin')">نشر الآن</button>
            </div>
        </section>

        <section id="playerWrite" class="page">
            <div class="glass-card">
                <h2 style="color:var(--gold)">كلمة اللاعب</h2>
                <input type="text" id="pName" placeholder="اسمك">
                <input type="file" id="pImgFile">
                <textarea id="pText" rows="4" placeholder="رسالتك..."></textarea>
                <button id="playerBtn" class="btn-action" onclick="publishWithFile('player')">نشر الكلمة</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://ymjasndwcyaodwnfvwza.supabase.co';
        const SB_KEY = 'sb_publishable_I1EvswkCrDQKbtgdhpbcZw_cwpwbt82';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userRole = "guest";
        const validUsers = {
            "Admin_AFC": { pass: "AFC_MGR2024", role: "admin" },
            "Player_1": { pass: "P1_2024", role: "player" }, "Player_2": { pass: "P2_2024", role: "player" },
            "Player_3": { pass: "P3_2024", role: "player" }, "Player_4": { pass: "P4_2024", role: "player" },
            "Player_5": { pass: "P5_2024", role: "player" }, "Player_6": { pass: "P6_2024", role: "player" }
        };

        function toggleNav() { const n = document.getElementById("sideNav"); n.style.width = n.style.width === "280px" ? "0" : "280px"; }
        function switchPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            toggleNav(); 
            loadAll();
        }

        async function uploadFile(file) {
            if(!file) return null;
            const name = Date.now() + "_" + file.name.replace(/[^\w.]/g, "_");
            await _supabase.storage.from('media').upload(name, file);
            return _supabase.storage.from('media').getPublicUrl(name).data.publicUrl;
        }

        async function publishWithFile(role) {
            const btn = role === 'admin' ? document.getElementById('mainBtn') : document.getElementById('playerBtn');
            btn.innerText = "جاري الرفع..."; btn.disabled = true;
            try {
                if(role === 'admin') {
                    const table = document.getElementById('targetTab').value;
                    const file = document.getElementById('mFile').files[0];
                    const url = await uploadFile(file);
                    let p = { title: document.getElementById('mTitle').value, content: document.getElementById('mContent').value };

                    if(table === 'news') p.image_url = url;
                    else if(table === 'training') { p.media_url = url; p.media_type = file?.type.includes('video') ? 'video' : 'image'; }
                    else if(table === 'matches') { p.venue = document.getElementById('ex1').value; p.match_time = document.getElementById('ex2').value; }
                    else if(table === 'training_times') { p.t_date = document.getElementById('ex1').value; p.t_time = document.getElementById('ex2').value; }
                    else if(table === 'player_of_month') { 
                        await _supabase.from('player_of_month').insert([{ player_name: p.title, player_img: url, votes: 0 }]); 
                        location.reload(); return; 
                    }
                    const { error } = await _supabase.from(table).insert([p]);
                    if(error) throw error;
                } else {
                    const url = await uploadFile(document.getElementById('pImgFile').files[0]);
                    await _supabase.from('players_word').insert([{ title: document.getElementById('pName').value, content: document.getElementById('pText').value, player_img: url }]);
                }
                location.reload();
            } catch (e) { alert("خطأ في النشر: " + e.message); btn.disabled = false; btn.innerText = "نشر الآن"; }
        }

        // --- نظام التصويت الأكثر أماناً (IP-Based) ---
        async function addVote(playerId, currentVotes) {
            const btn = event.target;
            btn.disabled = true; btn.innerText = "...";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const userIp = (await ipRes.json()).ip;

                const { data: voted } = await _supabase.from('votes_log').select('*').eq('ip_address', userIp).maybeSingle();
                if (voted) { alert("صوتك مسجل مسبقاً لهذا الشهر!"); btn.disabled = false; btn.innerText = "تصويت"; return; }

                await _supabase.from('player_of_month').update({ votes: currentVotes + 1 }).eq('id', playerId);
                await _supabase.from('votes_log').insert([{ ip_address: userIp, player_id: playerId }]);

                alert("تم التصويت بنجاح!"); loadAll();
            } catch (e) { alert("خطأ في الاتصال"); btn.disabled = false; btn.innerText = "تصويت"; }
        }

        async function loadAll() {
            const { data: news } = await _supabase.from('news').select('*').order('created_at', { ascending: false });
            let nH = ''; news?.forEach(i => nH += `<div class="glass-card">${userRole==='admin'?`<i class="fas fa-trash" style="position:absolute;left:15px;" onclick="deleteItem('news','${i.id}')"></i>`:''}${i.image_url?`<img src="${i.image_url}" class="news-img">`:''}<h3>${i.title}</h3><p>${i.content}</p></div>`);
            document.getElementById('newsFeed').innerHTML = nH || '<p>لا توجد أخبار</p>';

            const { data: matches } = await _supabase.from('matches').select('*').order('created_at', { ascending: false });
            let mH = ''; matches?.forEach(i => mH += `<div class="glass-card">${userRole==='admin'?`<i class="fas fa-trash" style="position:absolute;left:15px;" onclick="deleteItem('matches','${i.id}')"></i>`:''}<h3>${i.title}</h3><p>المكان: ${i.venue}<br>الوقت: ${i.match_time}</p></div>`);
            document.getElementById('matchesFeed').innerHTML = mH || '<p>لا توجد مباريات</p>';

            const { data: media } = await _supabase.from('training').select('*').order('created_at', { ascending: false });
            let tH = ''; media?.forEach(i => tH += `<div class="glass-card">${userRole==='admin'?`<i class="fas fa-trash" style="position:absolute;left:15px;" onclick="deleteItem('training','${i.id}')"></i>`:''}${i.media_type==='video'?`<video src="${i.media_url}" controls></video>`:`<img src="${i.media_url}" class="news-img">`}<h3>${i.title}</h3></div>`);
            document.getElementById('trainingFeed').innerHTML = tH || '<p>لا توجد لقطات</p>';

            const { data: tt } = await _supabase.from('training_times').select('*').order('created_at', { ascending: false });
            let ttH = ''; tt?.forEach(i => ttH += `<div class="glass-card">${userRole==='admin'?`<i class="fas fa-trash" style="position:absolute;left:15px;" onclick="deleteItem('training_times','${i.id}')"></i>`:''}<h3>${i.title}</h3><p>${i.t_date} | ${i.t_time}</p></div>`);
            document.getElementById('exerciseFeed').innerHTML = ttH || '<p>لا توجد تمارين</p>';
            
            const { data: vts } = await _supabase.from('player_of_month').select('*').order('votes', { ascending: false });
            let vH = ''; vts?.forEach(i => vH += `<div class="vote-card"><div style="display:flex;align-items:center;gap:10px;"><img src="${i.player_img}" class="player-circle"><b>${i.player_name} (${i.votes})</b></div><button class="vote-btn" onclick="addVote('${i.id}',${i.votes})">تصويت</button></div>`);
            document.getElementById('voteFeed').innerHTML = vH || '<p>لا يوجد مرشحين</p>';
        }

        async function deleteItem(t, id) { if(confirm("حذف؟")) { await _supabase.from(t).delete().eq('id', id); loadAll(); } }
        function toggleInputs() {
            const t = document.getElementById('targetTab').value;
            document.getElementById('extraFields').innerHTML = (t==='matches'||t==='training_times') ? `<input type="text" id="ex1" placeholder="المكان/التاريخ"><input type="text" id="ex2" placeholder="الزمان/الوقت">` : '';
        }
        async function openAbout() {
            document.getElementById('aboutModal').style.display = 'block'; document.getElementById('modalOverlay').style.display = 'block';
            const { data } = await _supabase.from('club_info').select('content').eq('id', 1).single();
            if (data) { document.getElementById('aboutContent').innerText = data.content; document.getElementById('aboutEditField').value = data.content; }
            if (userRole === 'admin') document.getElementById('adminAboutControls').style.display = 'block';
        }
        function closeAbout() { document.getElementById('aboutModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
        async function saveAbout() { await _supabase.from('club_info').upsert({ id: 1, content: document.getElementById('aboutEditField').value }); alert("تم الحفظ!"); openAbout(); }

        function handleLogin() {
            if(userRole !== "guest") { if(confirm("خروج؟")) { localStorage.clear(); location.reload(); } return; }
            let u = prompt("المستخدم:"), p = prompt("كلمة السر:");
            if (validUsers[u] && validUsers[u].pass === p) { localStorage.setItem('role', validUsers[u].role); location.reload(); } else alert("خطأ!");
        }

        window.onload = () => {
            userRole = localStorage.getItem('role') || 'guest';
            if(userRole !== 'guest') {
                document.getElementById('playerOnlyNav').style.display = 'block';
                document.getElementById('userIcon').style.color = userRole==='admin'?'#55ff55':'#D4A757';
                if(userRole==='admin') document.getElementById('adminMenu').style.display = 'block';
                if(userRole==='player') document.getElementById('playerMenu').style.display = 'block';
            }
            loadAll();
        };
    </script>
</body>
</html>
