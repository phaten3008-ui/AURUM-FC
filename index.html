<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFC | Media & News Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #D4A757; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #050505 url('017714e7a5037887c750e844f41e7d60.jpg') no-repeat center center fixed; background-size: cover; color: white; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: -1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .side-nav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); border-left: 1px solid rgba(255,255,255,0.1); overflow-x: hidden; transition: 0.5s ease; display: flex; flex-direction: column; }
        .nav-item { display: flex; align-items: center; padding: 20px 30px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-text { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); font-weight: bold; }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px 120px 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; position: relative; overflow: hidden; }
        
        /* ميديا الأخبار والتدريبات */
        .news-img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .video-container { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }

        /* دائرة صورة اللاعب */
        .player-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .player-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }

        .select-box { position: absolute; top: 15px; right: 15px; z-index: 20; width: 20px; height: 20px; accent-color: var(--gold); }
        .btn-action { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Cairo'; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 10px; font-family: 'Cairo'; box-sizing: border-box; }

        .bulk-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #ff4444; color: white; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.5s; z-index: 3000; }
        .bulk-bar.active { bottom: 30px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="bulkBar" class="bulk-bar">
        <span id="bulkCount">تم تحديد 0 عناصر</span>
        <button onclick="bulkDelete()" style="background:white; color:#ff4444; border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">حذف الكل</button>
    </div>

    <div id="sideNav" class="side-nav">
        <div style="padding: 30px;"><i class="fas fa-times" onclick="toggleNav()" style="color: var(--gold); font-size: 24px; cursor: pointer;"></i></div>
        <div style="flex-grow:1;">
            <div class="nav-item" onclick="switchPage('news')"><span class="nav-text">الأخبار</span></div>
            <div class="nav-item" onclick="switchPage('training')"><span class="nav-text">لقطات التدريب</span></div>
            <div class="nav-item" onclick="switchPage('matches')"><span class="nav-text">المباريات</span></div>
            <div class="nav-item" onclick="switchPage('players')"><span class="nav-text">كلمة اللاعبين</span></div>
            <div id="adminMenu" style="display:none;"><div class="nav-item" onclick="switchPage('adminHub')"><span class="nav-text">إدارة الميديا</span></div></div>
            <div id="playerMenu" style="display:none;"><div class="nav-item" onclick="switchPage('playerWrite')"><span class="nav-text">كتابة كلمة لاعب</span></div></div>
        </div>
        <div id="userStatus" style="padding:20px; text-align:center; color:var(--gold); font-size:12px;">زائر</div>
    </div>

    <header>
        <button onclick="toggleNav()" style="background:none; border:none;"><i class="fas fa-bars" style="color:var(--gold); font-size:22px;"></i></button>
        <div style="text-align:center;"><img src="PSX_20260412_121049_preview_rev_1-1_preview_rev_1.jpg" style="width:45px; border-radius:50%; border:1px solid var(--gold);"></div>
        <button onclick="handleLogin()" style="background:none; border:none;"><i class="fas fa-user-circle" id="userIcon" style="color:var(--gold); font-size:28px;"></i></button>
    </header>

    <div class="container">
        <section id="news" class="page active"><div id="newsFeed"></div></section>
        <section id="training" class="page"><div id="trainingFeed"></div></section>
        <section id="matches" class="page"><div id="matchesFeed"></div></section>
        <section id="players" class="page"><div id="playersFeed"></div></section>

        <section id="adminHub" class="page">
            <div class="glass-card">
                <h2 style="color:var(--gold)">إضافة محتوى إعلامي</h2>
                <select id="targetTable" onchange="toggleInputs()">
                    <option value="news">خبر مع صورة</option>
                    <option value="training">تدريبات (فيديو/صورة)</option>
                    <option value="matches">مباراة جديدة</option>
                </select>
                <input type="text" id="adminTitle" placeholder="العنوان">
                <input type="text" id="adminMediaUrl" placeholder="رابط الصورة أو الفيديو (URL)">
                <div id="trainingType" style="display:none;">
                    <select id="mediaType"><option value="image">نوع الميديا: صورة</option><option value="video">نوع الميديا: فيديو</option></select>
                </div>
                <div id="matchFields" style="display:none;">
                    <input type="text" id="matchVenue" placeholder="الملعب">
                    <input type="text" id="matchTime" placeholder="الوقت">
                </div>
                <textarea id="adminContent" rows="4" placeholder="التفاصيل"></textarea>
                <button class="btn-action" onclick="publish('admin')">نشر المحتوى</button>
            </div>
        </section>

        <section id="playerWrite" class="page">
            <div class="glass-card">
                <h2 style="color:var(--gold)">كابتن: اكتب كلمتك</h2>
                <input type="text" id="playerTitle" placeholder="اسمك الكامل">
                <input type="text" id="playerImgUrl" placeholder="رابط صورتك الشخصية (URL)">
                <textarea id="playerContent" rows="4" placeholder="رسالتك للجمهور..."></textarea>
                <button class="btn-action" onclick="publish('player')">نشر</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://ymjasndwcyaodwnfvwza.supabase.co';
        const SB_KEY = 'sb_publishable_I1EvswkCrDQKbtgdhpbcZw_cwpwbt82';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userRole = "guest";
        let selectedIds = [];
        let currentTable = "news";

        function toggleNav() { const n = document.getElementById("sideNav"); n.style.width = n.style.width === "280px" ? "0" : "280px"; }
        function switchPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            currentTable = (id === 'players') ? 'players_word' : id;
            selectedIds = []; document.getElementById('bulkBar').classList.remove('active');
            toggleNav(); 
        }

        function toggleInputs() {
            const table = document.getElementById('targetTable').value;
            document.getElementById('trainingType').style.display = table === 'training' ? 'block' : 'none';
            document.getElementById('matchFields').style.display = table === 'matches' ? 'block' : 'none';
        }

        function handleLogin() {
            let u = prompt("المستخدم:"); let p = prompt("كلمة السر:");
            if(u === "QEVC12" && p === "MGR12") {
                userRole = "admin"; document.getElementById('adminMenu').style.display = 'block';
                document.getElementById('userStatus').innerText = "المدير العام"; loadAll();
            } else if(u === "PLY11" && p === "BGHU3") {
                userRole = "player"; document.getElementById('playerMenu').style.display = 'block';
                document.getElementById('userStatus').innerText = "اللاعب"; loadAll();
            }
        }

        function updateSelection(checkbox, id) {
            if(checkbox.checked) selectedIds.push(id); else selectedIds = selectedIds.filter(i => i !== id);
            const bar = document.getElementById('bulkBar');
            document.getElementById('bulkCount').innerText = `تم تحديد ${selectedIds.length}`;
            if(selectedIds.length > 0) bar.classList.add('active'); else bar.classList.remove('active');
        }

        async function loadAll() {
            // تحميل الأخبار مع صور
            const { data: news } = await _supabase.from('news').select('*').order('created_at', { ascending: false });
            let newsHTML = '<h2 style="color:var(--gold)">آخر الأخبار</h2>';
            news.forEach(i => {
                newsHTML += `<div class="glass-card">
                    ${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')">` : ''}
                    ${i.image_url ? `<img src="${i.image_url}" class="news-img">` : ''}
                    <h3>${i.title}</h3><p>${i.content}</p>
                </div>`;
            });
            document.getElementById('newsFeed').innerHTML = newsHTML;

            // تحميل التدريبات
            const { data: train } = await _supabase.from('training').select('*').order('created_at', { ascending: false });
            let trainHTML = '<h2 style="color:var(--gold)">لقطات التدريب</h2>';
            train.forEach(i => {
                trainHTML += `<div class="glass-card">
                    ${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')">` : ''}
                    ${i.media_type === 'video' ? `<div class="video-container"><video src="${i.media_url}" controls style="width:100%"></video></div>` : `<img src="${i.media_url}" class="news-img">`}
                    <h3>${i.title}</h3><p>${i.content}</p>
                </div>`;
            });
            document.getElementById('trainingFeed').innerHTML = trainHTML;

            // تحميل كلمة اللاعبين مع صورة دائرية
            const { data: players } = await _supabase.from('players_word').select('*').order('created_at', { ascending: false });
            let pHTML = '<h2 style="color:var(--gold)">كلمة اللاعبين</h2>';
            players.forEach(i => {
                pHTML += `<div class="glass-card">
                    ${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')">` : ''}
                    <div class="player-header">
                        <img src="${i.player_img || 'https://via.placeholder.com/50'}" class="player-circle">
                        <h3 style="color:var(--gold); margin:0;">${i.title}</h3>
                    </div>
                    <p style="font-style:italic">" ${i.content} "</p>
                </div>`;
            });
            document.getElementById('playersFeed').innerHTML = pHTML;
        }

        async function publish(type) {
            let table = (type === 'admin') ? document.getElementById('targetTable').value : 'players_word';
            let payload = {
                title: (type === 'admin') ? document.getElementById('adminTitle').value : document.getElementById('playerTitle').value,
                content: (type === 'admin') ? document.getElementById('adminContent').value : document.getElementById('playerContent').value
            };

            if(type === 'admin') {
                if(table === 'news') payload.image_url = document.getElementById('adminMediaUrl').value;
                if(table === 'training') {
                    payload.media_url = document.getElementById('adminMediaUrl').value;
                    payload.media_type = document.getElementById('mediaType').value;
                }
            } else {
                payload.player_img = document.getElementById('playerImgUrl').value;
            }

            await _supabase.from(table).insert([payload]);
            location.reload();
        }

        async function bulkDelete() {
            if(!confirm("حذف المختار؟")) return;
            await _supabase.from(currentTable).delete().in('id', selectedIds);
            location.reload();
        }

        window.onload = loadAll;
    </script>
</body>
</html>
