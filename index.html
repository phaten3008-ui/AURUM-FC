<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFC | Elite Management Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --gold: #D4A757; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #050505 url('017714e7a5037887c750e844f41e7d60.jpg') no-repeat center center fixed; background-size: cover; color: white; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: -1; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        
        .side-nav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); border-left: 1px solid var(--border); overflow-x: hidden; transition: 0.5s; display: flex; flex-direction: column; }
        .nav-item { padding: 20px 30px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; color: var(--gold); font-weight: bold; }
        .nav-item:hover { background: rgba(212, 167, 87, 0.1); }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px 120px 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; position: relative; overflow: hidden; }
        .glass-card.selected { border-color: var(--gold); background: rgba(212, 167, 87, 0.08); }

        .news-img, video { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .player-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .player-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: #111; }

        .admin-controls { position: absolute; top: 15px; left: 15px; display: flex; gap: 15px; z-index: 10; }
        .admin-controls i { cursor: pointer; font-size: 18px; transition: 0.3s; opacity: 0.7; }
        .fa-trash { color: #ff5555; } .fa-edit { color: #55ff55; }
        .select-box { position: absolute; top: 15px; right: 15px; z-index: 20; width: 22px; height: 22px; accent-color: var(--gold); cursor: pointer; }

        .bulk-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #ff4444; color: white; padding: 15px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.5s; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bulk-bar.active { bottom: 30px; }

        .btn-action { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; font-family: 'Cairo'; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="bulkBar" class="bulk-bar">
        <span id="bulkCount">تم تحديد 0 عناصر</span>
        <button onclick="bulkDelete()" style="background:white; color:#ff4444; border:none; padding:8px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">حذف الكل</button>
    </div>

    <div id="sideNav" class="side-nav">
        <div style="padding:25px;"><i class="fas fa-times" onclick="toggleNav()" style="font-size:25px; color:var(--gold); cursor:pointer;"></i></div>
        <div class="nav-item" onclick="switchPage('news')">الأخبار</div>
        <div class="nav-item" onclick="switchPage('training')">لقطات التدريب</div>
        <div class="nav-item" onclick="switchPage('matches')">جدول المباريات</div>
        <div class="nav-item" onclick="switchPage('players')">كلمة اللاعبين</div>
        <div id="adminMenu" style="display:none; border-top:1px solid var(--gold);"><div class="nav-item" onclick="switchPage('adminHub')">إدارة المحتوى</div></div>
        <div id="playerMenu" style="display:none; border-top:1px solid var(--gold);"><div class="nav-item" onclick="switchPage('playerWrite')">كلمة لاعب</div></div>
    </div>

    <header>
        <button onclick="toggleNav()" style="background:none; border:none; color:var(--gold); font-size:25px;"><i class="fas fa-bars"></i></button>
        <img src="PSX_20260412_121049_preview_rev_1-1_preview_rev_1.jpg" style="width:45px; border-radius:50%; border:1px solid var(--gold);">
        <button onclick="handleLogin()" style="background:none; border:none; color:var(--gold); font-size:25px;"><i class="fas fa-user-circle" id="userIcon"></i></button>
    </header>

    <div class="container">
        <section id="news" class="page active"><div id="newsFeed"></div></section>
        <section id="training" class="page"><div id="trainingFeed"></div></section>
        <section id="matches" class="page"><div id="matchesFeed"></div></section>
        <section id="players" class="page"><div id="playersFeed"></div></section>

        <section id="adminHub" class="page">
            <div class="glass-card">
                <h2 style="color:var(--gold)">نشر محتوى جديد</h2>
                <select id="targetTab" onchange="toggleFormInputs()">
                    <option value="news">خبر جديد (صورة)</option>
                    <option value="training">لقطة تدريب (فيديو/صورة)</option>
                    <option value="matches">مباراة جديدة</option>
                </select>
                <input type="text" id="mTitle" placeholder="العنوان">
                <div id="fileArea">
                    <label style="font-size:12px; color:var(--gold)">ارفع الملف من جهازك:</label>
                    <input type="file" id="mFile">
                </div>
                <div id="matchFields" style="display:none;">
                    <input type="text" id="matchVenue" placeholder="الملعب">
                    <input type="text" id="matchTime" placeholder="الوقت والتاريخ">
                </div>
                <textarea id="mContent" rows="4" placeholder="التفاصيل..."></textarea>
                <button id="mainBtn" class="btn-action" onclick="publishWithFile('admin')">نشر الآن</button>
            </div>
        </section>

        <section id="playerWrite" class="page">
            <div class="glass-card">
                <h2 style="color:var(--gold)">كلمة لاعب</h2>
                <input type="text" id="pName" placeholder="اسمك">
                <label style="font-size:12px; color:var(--gold)">صورتك الشخصية:</label>
                <input type="file" id="pImgFile" accept="image/*">
                <textarea id="pText" rows="4" placeholder="رسالتك..."></textarea>
                <button id="playerBtn" class="btn-action" onclick="publishWithFile('player')">نشر الكلمة</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://ymjasndwcyaodwnfvwza.supabase.co';
        const SB_KEY = 'sb_publishable_I1EvswkCrDQKbtgdhpbcZw_cwpwbt82';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let userRole = "guest";
        let selectedIds = [];
        let currentTable = "news";

        function toggleNav() { const n = document.getElementById("sideNav"); n.style.width = n.style.width === "280px" ? "0" : "280px"; }
        function switchPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(['news', 'training', 'matches', 'players'].includes(id)) currentTable = (id === 'players') ? 'players_word' : id;
            selectedIds = []; document.getElementById('bulkBar').classList.remove('active');
            toggleNav(); 
        }

        function toggleFormInputs() {
            const t = document.getElementById('targetTab').value;
            document.getElementById('matchFields').style.display = t === 'matches' ? 'block' : 'none';
            document.getElementById('fileArea').style.display = t === 'matches' ? 'none' : 'block';
        }

        function handleLogin() {
            let u = prompt("المستخدم:"); let p = prompt("كلمة السر:");
            if(u === "QEVC12" && p === "MGR12") {
                userRole = "admin"; document.getElementById('adminMenu').style.display = 'block';
                document.getElementById('userIcon').style.color = "#55ff55"; loadAll();
            } else if(u === "PLY11" && p === "BGHU3") {
                userRole = "player"; document.getElementById('playerMenu').style.display = 'block';
                loadAll();
            }
        }

        function updateSelection(checkbox, id) {
            if(checkbox.checked) selectedIds.push(id); else selectedIds = selectedIds.filter(i => i !== id);
            const bar = document.getElementById('bulkBar');
            document.getElementById('bulkCount').innerText = `تم تحديد ${selectedIds.length}`;
            if(selectedIds.length > 0) bar.classList.add('active'); else bar.classList.remove('active');
        }

        async function uploadFile(file) {
            if(!file) return null;
            const cleanName = Date.now() + "_" + file.name.replace(/[^\w.]/g, "_");
            const { data, error } = await _supabase.storage.from('media').upload(cleanName, file);
            if (error) throw error;
            return _supabase.storage.from('media').getPublicUrl(cleanName).data.publicUrl;
        }

        async function publishWithFile(role) {
            const btn = role === 'admin' ? document.getElementById('mainBtn') : document.getElementById('playerBtn');
            btn.disabled = true; btn.innerText = "جاري الرفع...";
            try {
                if(role === 'admin') {
                    const table = document.getElementById('targetTab').value;
                    const file = document.getElementById('mFile').files[0];
                    const url = await uploadFile(file);
                    let payload = { title: document.getElementById('mTitle').value, content: document.getElementById('mContent').value };
                    if(table === 'news') payload.image_url = url;
                    else if(table === 'training') { payload.media_url = url; payload.media_type = file?.type.includes('video') ? 'video' : 'image'; }
                    else { payload.venue = document.getElementById('matchVenue').value; payload.match_time = document.getElementById('matchTime').value; }
                    await _supabase.from(table).insert([payload]);
                } else {
                    const file = document.getElementById('pImgFile').files[0];
                    const url = await uploadFile(file);
                    await _supabase.from('players_word').insert([{ title: document.getElementById('pName').value, content: document.getElementById('pText').value, player_img: url }]);
                }
                location.reload();
            } catch (e) { alert("خطأ!"); btn.disabled = false; btn.innerText = "حاول مرة أخرى"; }
        }

        async function loadAll() {
            // News
            const { data: news } = await _supabase.from('news').select('*').order('created_at', { ascending: false });
            let nH = '<h2>آخر الأخبار</h2>';
            news?.forEach(i => {
                nH += `<div class="glass-card">${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')"><div class="admin-controls"><i class="fas fa-trash" onclick="deleteItem('news','${i.id}')"></i></div>` : ''}${i.image_url ? `<img src="${i.image_url}" class="news-img">` : ''}<h3>${i.title}</h3><p>${i.content}</p></div>`;
            });
            document.getElementById('newsFeed').innerHTML = nH;

            // Training
            const { data: train } = await _supabase.from('training').select('*').order('created_at', { ascending: false });
            let tH = '<h2>لقطات التدريب</h2>';
            train?.forEach(i => {
                tH += `<div class="glass-card">${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')"><div class="admin-controls"><i class="fas fa-trash" onclick="deleteItem('training','${i.id}')"></i></div>` : ''}${i.media_type === 'video' ? `<video src="${i.media_url}" controls></video>` : `<img src="${i.media_url}" class="news-img">`}<h3>${i.title}</h3></div>`;
            });
            document.getElementById('trainingFeed').innerHTML = tH;

            // Matches
            const { data: matches } = await _supabase.from('matches').select('*').order('created_at', { ascending: false });
            let mH = '<h2>جدول المباريات</h2>';
            matches?.forEach(i => {
                mH += `<div class="glass-card">${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')"><div class="admin-controls"><i class="fas fa-trash" onclick="deleteItem('matches','${i.id}')"></i></div>` : ''}<h3>${i.title}</h3><div style="color:var(--gold); font-size:13px;"><i class="fas fa-map-marker-alt"></i> ${i.venue} | <i class="fas fa-clock"></i> ${i.match_time}</div></div>`;
            });
            document.getElementById('matchesFeed').innerHTML = mH;

            // Players
            const { data: players } = await _supabase.from('players_word').select('*').order('created_at', { ascending: false });
            let pH = '<h2>كلمة اللاعبين</h2>';
            players?.forEach(i => {
                pH += `<div class="glass-card">${userRole === 'admin' ? `<input type="checkbox" class="select-box" onchange="updateSelection(this, '${i.id}')">` : ''}<div class="player-header"><img src="${i.player_img || ''}" class="player-circle"><h3>${i.title}</h3></div><p>" ${i.content} "</p></div>`;
            });
            document.getElementById('playersFeed').innerHTML = pH;
        }

        async function deleteItem(t, id) { if(confirm("حذف؟")) { await _supabase.from(t).delete().eq('id', id); location.reload(); } }
        async function bulkDelete() { if(confirm(`حذف ${selectedIds.length} عناصر؟`)) { await _supabase.from(currentTable).delete().in('id', selectedIds); location.reload(); } }

        window.onload = loadAll;
    </script>
</body>
</html>
