<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFC | Comprehensive Admin Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold: #D4A757;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background: url('017714e7a5037887c750e844f41e7d60.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75); z-index: -1;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .side-nav {
            height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(40px);
            border-left: 1px solid var(--border); overflow-x: hidden;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column;
        }

        .nav-item { display: flex; align-items: center; padding: 12px 25px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .nav-text { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); font-weight: bold; margin-right: 15px; }

        .admin-box { background: rgba(212, 167, 87, 0.05); border: 1px solid var(--gold); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box;
        }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }

        .btn-action { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; width: 100%; transition: 0.3s;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="sideNav" class="side-nav">
        <div style="flex-grow:1; padding-top:80px;">
            <div class="nav-item" onclick="switchPage('news')"><span class="nav-text">آخر الأخبار</span></div>
            <div id="adminSection" style="display:none;">
                <div class="nav-item" onclick="switchPage('adminHub')" style="background:rgba(212,167,87,0.1); border-top:1px solid var(--gold);"><span class="nav-text">مركز الإدارة الشامل</span></div>
            </div>
        </div>
        <div style="padding: 20px;">
            <button id="authBtn" class="btn-action" style="background:none; color:var(--gold); border:1px solid var(--gold);" onclick="handleAuth()">دخول الإدارة</button>
        </div>
    </div>

    <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; justify-content:center; align-items:center; backdrop-filter:blur(20px);">
        <div class="glass-card" style="width:300px; text-align:center;">
            <h2 style="font-family:'Cinzel'; color:var(--gold);">Secure Access</h2>
            <input type="text" id="userInput" placeholder="المستخدم">
            <input type="password" id="passInput" placeholder="كلمة السر">
            <button class="btn-action" onclick="login()">دخول</button>
            <p onclick="hideLogin()" style="cursor:pointer; margin-top:15px; font-size:12px; color:var(--gold);">إلغاء</p>
        </div>
    </div>

    <header>
        <div style="width:40px"></div>
        <div style="text-align:center;">
            <img src="PSX_20260412_121049_preview_rev_1-1_preview_rev_1.jpg" style="width:60px; border-radius:50%; border:2px solid var(--gold);">
            <h1 style="font-family:'Cinzel'; color:var(--gold); font-size:18px; margin:0;">AFC PORTAL</h1>
        </div>
        <button onclick="toggleNav()" style="background:none; border:1px solid var(--gold); padding:10px; border-radius:8px;">
            <i class="fas fa-bars" style="color:var(--gold)"></i>
        </button>
    </header>

    <div class="container">
        <section id="adminHub" class="page">
            <div class="admin-box admin-form">
                <h2 style="font-family:'Cinzel'; color:var(--gold); margin-top:0;">تحديث السحاب</h2>
                <input type="text" id="titleInput" placeholder="عنوان الخبر">
                <textarea id="descInput" placeholder="التفاصيل"></textarea>
                <button class="btn-action" onclick="publish()">نشر الآن</button>
            </div>
        </section>

        <section id="news" class="page active">
            <div id="newsFeed"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // بيانات الربط التي أرسلتها
        const SUPABASE_URL = 'https://ymjasndwcyaodwnfvwza.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_I1EvswkCrDQKbtgdhpbcZw_cwpwbt82';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUserRole = "guest";

        async function loadNews() {
            const { data, error } = await supabase.from('news').select('*').order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = '<h2 style="font-family:Cinzel; color:var(--gold)">آخر الأخبار</h2>';
            data.forEach(item => {
                feed.innerHTML += `
                    <div class="glass-card">
                        <h3 style="color:var(--gold); margin:0;">${item.title}</h3>
                        <p>${item.content}</p>
                        <small style="opacity:0.4">${new Date(item.created_at).toLocaleDateString('ar-EG')}</small>
                    </div>`;
            });
        }

        async function publish() {
            const title = document.getElementById('titleInput').value;
            const content = document.getElementById('descInput').value;
            if(!title || !content) return alert("املأ الخانات!");

            const { error } = await supabase.from('news').insert([{ title, content }]);
            if (error) {
                alert("خطأ: تأكد من إيقاف RLS في Supabase");
            } else {
                alert("تم النشر بنجاح!");
                document.getElementById('titleInput').value = "";
                document.getElementById('descInput').value = "";
                switchPage('news');
                loadNews();
            }
        }

        // وظائف الواجهة
        function toggleNav() { const n = document.getElementById("sideNav"); n.style.width = n.style.width === "300px" ? "0" : "300px"; }
        function switchPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleNav();
        }
        function showLogin() { document.getElementById('loginOverlay').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
        
        function handleAuth() { if (currentUserRole === "guest") showLogin(); else logout(); }

        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "QEVC12" && p === "MGR12") {
                currentUserRole = "admin";
                document.getElementById('adminSection').style.display = 'block';
                document.getElementById('authBtn').innerText = "خروج";
                hideLogin();
                alert("أهلاً بك يا مدير.");
            } else { alert("خطأ!"); }
        }

        // تحميل أولي
        loadNews();
    </script>
</body>
</html>
